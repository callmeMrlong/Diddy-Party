<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diddy Party Countdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Animated background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #2a005a44 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #00005a44 0%, transparent 60%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff00cc, #aa00ff, #00cfff, #ff00cc);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #bb88ff;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 50px;
      opacity: 0.8;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px 20px 18px;
      min-width: 110px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(170, 0, 255, 0.15);
      transition: transform 0.2s;
    }

    .box:hover { transform: translateY(-4px); }

    .num {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 20px rgba(200, 100, 255, 0.8);
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #cc88ff;
      margin-top: 8px;
    }

    .divider {
      font-size: 2.5rem;
      color: #aa00ff55;
      align-self: center;
      font-weight: 300;
    }

    .date-label {
      margin-top: 40px;
      color: #9966cc;
      font-size: 0.85rem;
      letter-spacing: 3px;
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }
    .orb1 { width: 400px; height: 400px; background: #aa00ff; top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: #ff00cc; bottom: -80px; right: -80px; animation-delay: -4s; }

    @keyframes shimmer {
      0% { background-position: 0% }
      100% { background-position: 300% }
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">
    <h1>Diddy Party</h1>
    <p class="subtitle">Countdown to June 4th, 2028</p>

    <div class="grid">
      <div class="box">
        <div class="num" id="years">0</div>
        <div class="label">Years</div>
      </div>
      <div class="divider">:</div>
      <div class="box">
        <div class="num" id="months">0</div>
        <div class="label">Months</div>
      </div>
      <div class="divider">:</div>
      <div class="box">
        <div class="num" id="days">0</div>
        <div class="label">Days</div>
      </div>
      <div class="divider">:</div>
      <div class="box">
        <div class="num" id="hours">0</div>
        <div class="label">Hours</div>
      </div>
      <div class="divider">:</div>
      <div class="box">
        <div class="num" id="minutes">0</div>
        <div class="label">Minutes</div>
      </div>
      <div class="divider">:</div>
      <div class="box">
        <div class="num" id="seconds">0</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <p class="date-label">06 · 04 · 2028</p>
  </div>

  <script>
    const target = new Date(2028, 5, 4, 0, 0, 0); // June 4, 2028 midnight

    function pad(n) { return String(n).padStart(2, '0'); }

    function update() {
      const now = new Date();
      const totalMs = target - now;

      if (totalMs <= 0) {
        document.querySelector('h1').textContent = "It's Party Time! 🎉";
        document.querySelectorAll('.num').forEach(el => el.textContent = '00');
        return;
      }

      // --- Years and Months using calendar math ---
      let y  = target.getFullYear() - now.getFullYear();
      let mo = target.getMonth()    - now.getMonth();
      let d  = target.getDate()     - now.getDate();

      if (d  < 0) { mo--; d += new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate(); }
      if (mo < 0) { y--;  mo += 12; }

      // --- Days: midnight of (now + y years + mo months) to target midnight ---
      const ref  = new Date(now.getFullYear() + y, now.getMonth() + mo, now.getDate(), 0, 0, 0);
      const days = Math.floor((target - ref) / 86400000);

      // --- Hours / Minutes / Seconds from total ms ---
      const hrs  = Math.floor(totalMs / 3600000) % 24;
      const mins = Math.floor(totalMs /   60000) % 60;
      const secs = Math.floor(totalMs /    1000) % 60;

      document.getElementById('years').textContent   = pad(y);
      document.getElementById('months').textContent  = pad(mo);
      document.getElementById('days').textContent    = pad(days);
      document.getElementById('hours').textContent   = pad(hrs);
      document.getElementById('minutes').textContent = pad(mins);
      document.getElementById('seconds').textContent = pad(secs);
    }

    update();
    setInterval(update, 1000); // runs every second
  </script>
</body>
</html>
